name: Build and Release

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-desktop:
    name: Build Desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            suffix: "win"
          - os: macos-latest
            suffix: "mac-arm"
          - os: ubuntu-latest
            suffix: "linux"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yt-dlp yt-dlp-ejs pyinstaller pillow

      # -----------------------------------------------------------------------
      # Windows: Install Inno Setup so ISCC.exe is available for build.py
      # -----------------------------------------------------------------------
      - name: Install Inno Setup (Windows)
        if: runner.os == 'Windows'
        run: |
          choco install innosetup --yes --no-progress
        shell: bash

      # -----------------------------------------------------------------------
      # Linux: Install makeself so the .run installer can be created
      # -----------------------------------------------------------------------
      - name: Install makeself (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y makeself

      - name: Build Binary
        run: python desktop/build.py
        shell: bash

      - name: Collect Artifacts
        run: |
          mkdir -p staging
          find desktop/dist -maxdepth 1 -mindepth 1 ! -name ".*" -exec cp -rv "{}" staging/ \;
        shell: bash

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-downloader-${{ matrix.suffix }}
          path: staging/

  release:
    name: Create GitHub Release
    needs: build-desktop
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare Release Files
        run: |
          VERSION=$(jq -r .version version.json)
          mkdir -p release_files

          # Windows: _Setup.exe is the installer (portable .exe was deleted by build.py)
          find artifacts/youtube-downloader-win \
            -name "*_Setup.exe" \
            -exec cp -v {} release_files/YouTube_Downloader_Setup.exe \;

          # macOS: DMG unchanged
          find artifacts/youtube-downloader-mac-arm \
            -name "*.dmg" \
            -exec cp -v {} release_files/YouTube_Downloader_ARM.dmg \;

          # Linux: .run self-extracting installer
          find artifacts/youtube-downloader-linux \
            -name "*.run" \
            -exec cp -v {} release_files/YouTube_Downloader_Linux.run \;

          # Make Linux installer executable in the release
          chmod +x release_files/YouTube_Downloader_Linux.run || true

          echo "--- Files to release ---"
          ls -lh release_files/

      - name: Create Release and Upload
        uses: softprops/action-gh-release@v2
        with:
          files: release_files/*
          generate_release_notes: true
          draft: false
          prerelease: false
